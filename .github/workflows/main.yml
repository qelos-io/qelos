name: Qelos CI/CD

on:
  push:
    branches: [ main, develop, 'feature/**', 'release/**', 'hotfix/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-monorepo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.29.3
          run_install: false
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build packages
        run: pnpm --filter "./packages/**" build

      - name: Build integrators
        run: pnpm --filter "./integrators/**" build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test FastAPI integrator
        run: |
          python -m pip install -U pip
          python -m pip install -e "./packages/python-sdk"
          python -m pip install -e "./integrators/fastapi[dev]"
          python -m pytest integrators/fastapi/tests -q

      - name: Build apps
        run: pnpm --filter "./apps/**" build
        
      - name: Run tests
        run: pnpm -r run test
        env:
          QELOS_E2E_URL: ${{ secrets.QELOS_E2E_URL }}
          QELOS_E2E_USERNAME: ${{ secrets.QELOS_E2E_USERNAME }}
          QELOS_E2E_PASSWORD: ${{ secrets.QELOS_E2E_PASSWORD }}

      - name: Integrator E2E (requires QELOS_E2E_URL / runs skipped otherwise)
        run: pnpm -F e2e test
        env:
          QELOS_INTEGRATOR_E2E_URL: ${{ secrets.QELOS_E2E_URL }}
          QELOS_INTEGRATOR_E2E_USERNAME: ${{ secrets.QELOS_E2E_USERNAME }}
          QELOS_INTEGRATOR_E2E_PASSWORD: ${{ secrets.QELOS_E2E_PASSWORD }}

      - name: Pack apps
        run: node pack-apps.mjs
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: apps/**/*.tgz
          retention-days: 1
