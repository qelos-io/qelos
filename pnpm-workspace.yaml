packages:
  - apps/*
  - packages/*
  - integrators/*
  - e2e
  - documentation

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  core-js: true
  esbuild: true
  node-jq: true
  protobufjs: true
  sharp: true
  vue-demi: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - aws-sdk
  - core-js
  - esbuild
  - node-jq
  - protobufjs
  - sharp
  - vue-demi
