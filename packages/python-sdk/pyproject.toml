[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "qelos-sdk"
version = "3.11.9"
description = "Python SDK for Qelos API - Build SaaS applications with ease"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [
    { name = "Qelos", email = "support@qelos.io" }
]
keywords = ["qelos", "sdk", "saas", "api", "multi-tenant"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.24.0",
]

[project.urls]
Homepage = "https://qelos.io"
Documentation = "https://docs.qelos.io"
Repository = "https://github.com/qelos-io/qelos"

[tool.setuptools.packages.find]
include = ["qelos_sdk*"]
